- hosts: infra
  become: true

  tasks:
  
    - name: Opret mappe til node_exporter
      file:
        path: /opt/node-exporter
        state: directory
        mode: '0755'

    - name: Kopiér docker-compose fil
      copy:
        src: ../files/node-exporter/docker-compose.yml
        dest: /opt/node-exporter/docker-compose.yml
        mode: '0644'

    - name: Sikr at infra_net eksisterer
      command: docker network inspect infra_net
      register: network_check
      ignore_errors: true
      changed_when: false

    - name: Opret infra_net hvis den ikke findes
      command: docker network create infra_net
      when: network_check.rc != 0

    - name: Start node_exporter container
      command: docker compose up -d
      args:
        chdir: /opt/node-exporter