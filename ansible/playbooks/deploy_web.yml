- hosts: web
  become: true

  tasks:

    - name: Opret mappe til web
      ansible.builtin.file:
        path: /opt/web
        state: directory
        mode: '0755'

    - name: Kopiér web-filer til serveren
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker/web/"
        dest: /opt/web/
        mode: '0755'

    - name: Sikr at infra_net eksisterer
      ansible.builtin.command: docker network inspect infra_net
      register: network_check
      ignore_errors: true
      changed_when: false

    - name: Opret infra_net hvis den ikke findes
      ansible.builtin.command: docker network create infra_net
      when: network_check.rc != 0

    - name: Start nginx container
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /opt/web