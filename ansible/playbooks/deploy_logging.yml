- hosts: logs
  become: true

  tasks:

    - name: Opret mappe til Prometheus
      ansible.builtin.file:
        path: /opt/prometheus
        state: directory
        mode: '0755'

    - name: Opret mappe til Grafana
      ansible.builtin.file:
        path: /opt/grafana
        state: directory
        mode: '0755'

    - name: Kopiér Prometheus-filer
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker/log/prometheus/"
        dest: /opt/prometheus/
        mode: '0755'

    - name: Kopiér Grafana-filer
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker/log/grafana/"
        dest: /opt/grafana/
        mode: '0755'

    - name: Sikr at infra_net eksisterer
      ansible.builtin.command: docker network inspect infra_net
      register: network_check
      ignore_errors: true
      changed_when: false

    - name: Opret infra_net hvis den ikke findes
      ansible.builtin.command: docker network create infra_net
      when: network_check.rc != 0

    - name: Start Prometheus
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /opt/prometheus

    - name: Start Grafana
      ansible.builtin.command: docker compose up -d
      args:
        chdir: /opt/grafana