version: "3.9"
services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: dit_kodeord_her
    networks:
      - infra_net

volumes:
  grafana_data:

networks:
  infra_net:
    external: true